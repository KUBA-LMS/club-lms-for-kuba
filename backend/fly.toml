# fly.toml - Fly.io app configuration

app = 'club-lms-for-kuba'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8002
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
