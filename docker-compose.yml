services:
  postgres:
    image: postgres:16-alpine
    container_name: club-lms-postgres
    environment:
      POSTGRES_USER: club_lms_user
      POSTGRES_PASSWORD: club_lms_password
      POSTGRES_DB: club_lms_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U club_lms_user -d club_lms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: club-lms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
